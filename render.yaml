services:
  - type: web
    name: student-emotional-analytics-backend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    nodeVersion: "18"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false